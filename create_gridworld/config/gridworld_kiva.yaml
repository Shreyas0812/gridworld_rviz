# Kiva-Style Pod Storage Warehouse Configuration
# Based on: Wurman, P.R., D'Andrea, R., & Mountz, M. (2008).
#   "Coordinating Hundreds of Cooperative, Autonomous Vehicles in Warehouses."
#   AI Magazine, 29(1), 9-19. https://doi.org/10.1609/aimag.v29i1.2082
#
# Layout: Central 4x5 matrix of movable shelf pods (2x2 cells each).
#   Agents navigate 3-cell vertical aisles and 4-cell horizontal aisles between pods.
#   Inventory arrives at left-wall truck docks (induct) and is picked at top/bottom
#   highway workstations (eject), matching the Kiva pod-retrieval workflow.
#   Maintenance bay on right side. Agent count scaled from Wurman et al.'s
#   reported density of ~100-150 robots per facility.
#
# Grid: 36x36 | Agents: 20 | Induct: 5 | Eject: 10 | Charging: 12

create_gridworld_node:
  ros__parameters:
    grid_width: 36
    grid_height: 36
    grid_depth: 1
    grid_resolution: 1.0
    publish_rate: 20.0

    obstacle_regions: [
      # Perimeter walls
      0, 0, 0, 35, 1, 0,         # Bottom border
      0, 34, 0, 35, 35, 0,       # Top border
      0, 0, 0, 1, 35, 0,         # Left border
      34, 0, 0, 35, 35, 0,       # Right border

      # Maintenance bay (right side, accessible from x=31)
      32, 5, 0, 33, 30, 0,       # Maintenance bay area

      # Pod matrix: 4 rows x 5 columns of 2x2 shelf pods
      # Pod columns centered at x=9,14,19,24,29  (5-cell spacing -> 3-cell vertical aisles)
      # Pod rows    centered at y=8,14,20,26      (6-cell spacing -> 4-cell horizontal aisles)
      # Left highway (truck access): x=2-7
      # Top/bottom highways (picking):  y=2-5 and y=30-33

      # Pod row 1 (y=8-9)
      9,  8, 0, 10,  9, 0,       # Pod (1,1)
      14,  8, 0, 15,  9, 0,      # Pod (1,2)
      19,  8, 0, 20,  9, 0,      # Pod (1,3)
      24,  8, 0, 25,  9, 0,      # Pod (1,4)
      29,  8, 0, 30,  9, 0,      # Pod (1,5)

      # Pod row 2 (y=14-15)
      9, 14, 0, 10, 15, 0,       # Pod (2,1)
      14, 14, 0, 15, 15, 0,      # Pod (2,2)
      19, 14, 0, 20, 15, 0,      # Pod (2,3)
      24, 14, 0, 25, 15, 0,      # Pod (2,4)
      29, 14, 0, 30, 15, 0,      # Pod (2,5)

      # Pod row 3 (y=20-21)
      9, 20, 0, 10, 21, 0,       # Pod (3,1)
      14, 20, 0, 15, 21, 0,      # Pod (3,2)
      19, 20, 0, 20, 21, 0,      # Pod (3,3)
      24, 20, 0, 25, 21, 0,      # Pod (3,4)
      29, 20, 0, 30, 21, 0,      # Pod (3,5)

      # Pod row 4 (y=26-27)
      9, 26, 0, 10, 27, 0,       # Pod (4,1)
      14, 26, 0, 15, 27, 0,      # Pod (4,2)
      19, 26, 0, 20, 27, 0,      # Pod (4,3)
      24, 26, 0, 25, 27, 0,      # Pod (4,4)
      29, 26, 0, 30, 27, 0       # Pod (4,5)
    ]

    # Agent positions: [x, y, z, agent_id]
    # 20 agents (~1.54 agents/100m², Staples-scale Kiva density)
    # Left highway (x=5): 5 agents (every other y-level)
    # Horizontal aisles (y=11,17,23): 5 agents each at x=8,13,18,23,28
    agent_positions: [
      # Left highway (x=5), every other y-level
       5,  6, 0,  1,   5, 11, 0,  2,   5, 17, 0,  3,   5, 23, 0,  4,   5, 29, 0,  5,
      # Aisle between pod rows 1-2 (y=11): 5 agents
       8, 11, 0,  6,  13, 11, 0,  7,  18, 11, 0,  8,  23, 11, 0,  9,  28, 11, 0, 10,
      # Aisle between pod rows 2-3 (y=17): 5 agents
       8, 17, 0, 11,  13, 17, 0, 12,  18, 17, 0, 13,  23, 17, 0, 14,  28, 17, 0, 15,
      # Aisle between pod rows 3-4 (y=23): 5 agents
       8, 23, 0, 16,  13, 23, 0, 17,  18, 23, 0, 18,  23, 23, 0, 19,  28, 23, 0, 20
    ]

    # Induct stations: left-wall truck docks (inventory arrival)
    # [x, y, z, station_id]
    induct_stations: [
      2,  6, 0, 1,               # Induct/Dock 1
      2, 12, 0, 2,               # Induct/Dock 2
      2, 18, 0, 3,               # Induct/Dock 3
      2, 24, 0, 4,               # Induct/Dock 4
      2, 30, 0, 5                # Induct/Dock 5
    ]

    # Eject stations: top and bottom highway picking/packing workstations
    # [x, y, z, station_id]
    eject_stations: [
      # Top highway workstations (y=32), aligned with pod columns
      9,  32, 0, 1,
      14, 32, 0, 2,
      19, 32, 0, 3,
      24, 32, 0, 4,
      29, 32, 0, 5,
      # Bottom highway workstations (y=4), aligned with pod columns
      9,   4, 0, 6,
      14,  4, 0, 7,
      19,  4, 0, 8,
      24,  4, 0, 9,
      29,  4, 0, 10
    ]

    energy:
      max_energy: 800                  # Maximum battery capacity (grid steps); tuned for ~10 tasks per charge cycle
      charge_duration: 20
      charge_speed: 1                  # Charge-remaining decrements per timestep; higher = shorter docking time (charge_duration / charge_speed = timesteps at charger)
      charging_trigger_multiplier: 5.0

    # Charging stations inside maintenance bay (x=32), 2-cell spacing, 12 stations
    # Cells overwrite obstacle marking, accessible from x=31
    charging_stations: [
      32,  6, 0,  1,
      32,  8, 0,  2,
      32, 10, 0,  3,
      32, 12, 0,  4,
      32, 14, 0,  5,
      32, 16, 0,  6,
      32, 18, 0,  7,
      32, 20, 0,  8,
      32, 22, 0,  9,
      32, 24, 0, 10,
      32, 26, 0, 11,
      32, 28, 0, 12
    ]

    # Idle-task stations for idle fallback (non-charging parking)
    # Placed along left wall (x=3,4), one per induct-dock y-level — clear of all obstacles,
    # induct stations (x=2), charging stations (x=32), and agent starts (x=5)
    idle_task_stations: [
      3,  6, 0,  1,   4,  6, 0,  2,
      3, 12, 0,  3,   4, 12, 0,  4,
      3, 18, 0,  5,   4, 18, 0,  6,
      3, 24, 0,  7,   4, 24, 0,  8,
      3, 30, 0,  9,   4, 30, 0, 10
    ]

    visualization:
      node_scale: 0.15
      node_color: [0.0, 1.0, 0.0, 0.7]
      edge_width: 0.05
      edge_color: [0.0, 0.0, 1.0, 0.6]
      obstacle_scale: 0.95
      obstacle_color: [1.0, 0.0, 0.0, 0.9]
      agent_scale: 0.4
      agent_color: [1.0, 0.0, 1.0, 1.0]
      induct_station_scale: 1.0
      induct_station_color: [0.0, 0.5, 1.0, 1.0]
      eject_station_scale: 0.8
      eject_station_color: [1.0, 0.5, 0.0, 1.0]
      charging_station_scale: 0.9
      charging_station_color: [0.0, 1.0, 0.5, 1.0]

    frame_id: "map"

    topics:
      nodes: "gridworld/nodes"
      edges: "gridworld/edges"
      obstacles: "gridworld/obstacles"
      agents: "gridworld/agents"
      induct_stations: "gridworld/induct_stations"
      eject_stations: "gridworld/eject_stations"
      charging_stations: "gridworld/charging_stations"
