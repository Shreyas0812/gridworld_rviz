# Kiva-Style Pod Storage Warehouse — Large Configuration
# Based on: Wurman, P.R., D'Andrea, R., & Mountz, M. (2008).
#   "Coordinating Hundreds of Cooperative, Autonomous Vehicles in Warehouses."
#   AI Magazine, 29(1), 9-19. https://doi.org/10.1609/aimag.v29i1.2082
#
# Layout: 2x scaled version of gridworld_kiva.yaml. Central 4x5 matrix of 4x4 shelf pods.
#   Agents navigate 6-cell vertical aisles and 8-cell horizontal aisles between pods.
#   Left-wall induct (truck docks), top/bottom highway eject (picking stations).
#   Maintenance bay on right side (x=64-67, accessible from x=63). Left highway x=2..9.
#   200 agents at ~7% passable-cell density — representative of Staples-scale Kiva facilities
#   (500 robots / 30,000 m²) while remaining computationally tractable.
#
# Grid: 72x72 | Agents: 80 | Induct: 5 | Eject: 10 | Charging: 12
#
# Pod matrix (4 rows x 5 columns, each pod 4x4 cells, 10-cell column spacing):
#   Columns at x=18-21, 28-31, 38-41, 48-51, 58-61
#   Rows    at y=16-19, 28-31, 40-43, 52-55
# Passable vertical aisle centers:  x=14, 24, 34, 44, 54, 62
# Passable horizontal aisle centers: y=22, 34, 46
# Left highway: x=2-9  |  Top highway: y=58-67  |  Bottom area: y=4-14

create_gridworld_node:
  ros__parameters:
    grid_width: 72
    grid_height: 72
    grid_depth: 1
    grid_resolution: 1.0
    publish_rate: 10.0

    obstacle_regions: [
      # Perimeter walls (2-cell thick)
      0,  0, 0, 71,  1, 0,       # Bottom border
      0, 70, 0, 71, 71, 0,       # Top border
      0,  0, 0,  1, 71, 0,       # Left border
      70, 0, 0, 71, 71, 0,       # Right border

      # Maintenance bay (right side, x=64-67, accessible from x=63)
      64, 10, 0, 67, 60, 0,

      # Pod row 1 (y=16-19): 5 pods, each 4x4 cells
      18, 16, 0, 21, 19, 0,      # Pod (1,1)
      28, 16, 0, 31, 19, 0,      # Pod (1,2)
      38, 16, 0, 41, 19, 0,      # Pod (1,3)
      48, 16, 0, 51, 19, 0,      # Pod (1,4)
      58, 16, 0, 61, 19, 0,      # Pod (1,5)

      # Pod row 2 (y=28-31)
      18, 28, 0, 21, 31, 0,      # Pod (2,1)
      28, 28, 0, 31, 31, 0,      # Pod (2,2)
      38, 28, 0, 41, 31, 0,      # Pod (2,3)
      48, 28, 0, 51, 31, 0,      # Pod (2,4)
      58, 28, 0, 61, 31, 0,      # Pod (2,5)

      # Pod row 3 (y=40-43)
      18, 40, 0, 21, 43, 0,      # Pod (3,1)
      28, 40, 0, 31, 43, 0,      # Pod (3,2)
      38, 40, 0, 41, 43, 0,      # Pod (3,3)
      48, 40, 0, 51, 43, 0,      # Pod (3,4)
      58, 40, 0, 61, 43, 0,      # Pod (3,5)

      # Pod row 4 (y=52-55)
      18, 52, 0, 21, 55, 0,      # Pod (4,1)
      28, 52, 0, 31, 55, 0,      # Pod (4,2)
      38, 52, 0, 41, 55, 0,      # Pod (4,3)
      48, 52, 0, 51, 55, 0,      # Pod (4,4)
      58, 52, 0, 61, 55, 0       # Pod (4,5)
    ]

    # Agent positions: [x, y, z, agent_id]
    # 80 agents (~1.54 agents/100m², Staples-scale Kiva density)
    # Left highway (x=6): 10 | Left highway (x=3): 4 | Horizontal aisles: 18
    # Pod vertical aisles: 24 | Top highway: 10 | Bottom area: 10 | Fill: 4
    agent_positions: [
      # Left highway (x=6), spaced along full height
       6, 12, 0,  1,   6, 16, 0,  2,   6, 22, 0,  3,   6, 28, 0,  4,
       6, 34, 0,  5,   6, 40, 0,  6,   6, 46, 0,  7,   6, 52, 0,  8,
       6, 58, 0,  9,   6, 64, 0, 10,
      # Left highway (x=3), pod-row levels
       3, 16, 0, 11,   3, 28, 0, 12,   3, 40, 0, 13,   3, 52, 0, 14,
      # Aisle between pod rows 1-2 (y=22): 6 agents
      14, 22, 0, 15,  24, 22, 0, 16,  34, 22, 0, 17,  44, 22, 0, 18,  54, 22, 0, 19,  62, 22, 0, 20,
      # Aisle between pod rows 2-3 (y=34): 6 agents
      14, 34, 0, 21,  24, 34, 0, 22,  34, 34, 0, 23,  44, 34, 0, 24,  54, 34, 0, 25,  62, 34, 0, 26,
      # Aisle between pod rows 3-4 (y=46): 6 agents
      14, 46, 0, 27,  24, 46, 0, 28,  34, 46, 0, 29,  44, 46, 0, 30,  54, 46, 0, 31,  62, 46, 0, 32,
      # Pod row 1 vertical aisles (y=17)
      14, 17, 0, 33,  24, 17, 0, 34,  34, 17, 0, 35,  44, 17, 0, 36,  54, 17, 0, 37,  62, 17, 0, 38,
      # Pod row 2 vertical aisles (y=29)
      14, 29, 0, 39,  24, 29, 0, 40,  34, 29, 0, 41,  44, 29, 0, 42,  54, 29, 0, 43,  62, 29, 0, 44,
      # Pod row 3 vertical aisles (y=41)
      14, 41, 0, 45,  24, 41, 0, 46,  34, 41, 0, 47,  44, 41, 0, 48,  54, 41, 0, 49,  62, 41, 0, 50,
      # Pod row 4 vertical aisles (y=53)
      14, 53, 0, 51,  24, 53, 0, 52,  34, 53, 0, 53,  44, 53, 0, 54,  54, 53, 0, 55,  62, 53, 0, 56,
      # Top highway (y=60,62)
      18, 60, 0, 57,  28, 60, 0, 58,  38, 60, 0, 59,  48, 60, 0, 60,  58, 60, 0, 61,
      18, 62, 0, 62,  28, 62, 0, 63,  38, 62, 0, 64,  48, 62, 0, 65,  58, 62, 0, 66,
      # Bottom area (y=6,10)
      18,  6, 0, 67,  28,  6, 0, 68,  38,  6, 0, 69,  48,  6, 0, 70,  58,  6, 0, 71,
      18, 10, 0, 72,  28, 10, 0, 73,  38, 10, 0, 74,  48, 10, 0, 75,  58, 10, 0, 76,
      # Additional (y=20 aisle row, 4 agents)
      14, 20, 0, 77,  24, 20, 0, 78,  34, 20, 0, 79,  44, 20, 0, 80
    ]

    # Induct stations: left-wall truck docks (2x scaled from kiva.yaml)
    # [x, y, z, station_id]
    induct_stations: [
      4, 12, 0, 1,               # Dock 1
      4, 24, 0, 2,               # Dock 2
      4, 36, 0, 3,               # Dock 3
      4, 48, 0, 4,               # Dock 4
      4, 60, 0, 5                # Dock 5
    ]

    # Eject stations: top and bottom highway picking workstations
    # [x, y, z, station_id]
    eject_stations: [
      # Top highway (y=64), aligned with pod columns
      18, 64, 0,  1,
      28, 64, 0,  2,
      38, 64, 0,  3,
      48, 64, 0,  4,
      58, 64, 0,  5,
      # Bottom highway (y=8), aligned with pod columns
      18,  8, 0,  6,
      28,  8, 0,  7,
      38,  8, 0,  8,
      48,  8, 0,  9,
      58,  8, 0, 10
    ]

    energy:
      max_energy: 1600                 # Maximum battery capacity (grid steps); tuned for ~10 tasks per charge cycle
      charge_duration: 30
      charge_speed: 1                  # Charge-remaining decrements per timestep; higher = shorter docking time (charge_duration / charge_speed = timesteps at charger)
      charging_trigger_multiplier: 5.0

    # Charging stations inside maintenance bay (x=64), 4-cell spacing, 12 stations
    # Cells overwrite obstacle marking, accessible from x=63
    charging_stations: [
      64, 12, 0,  1,
      64, 16, 0,  2,
      64, 20, 0,  3,
      64, 24, 0,  4,
      64, 28, 0,  5,
      64, 32, 0,  6,
      64, 36, 0,  7,
      64, 40, 0,  8,
      64, 44, 0,  9,
      64, 48, 0, 10,
      64, 52, 0, 11,
      64, 56, 0, 12
    ]

    # Idle-task stations for idle fallback (non-charging parking)
    # Placed at x=5,7 per induct-dock y-level — clear of all obstacles, induct stations (x=4),
    # charging stations (x=64), and agent starts (x=3 at pod-row levels, x=6 at all levels)
    idle_task_stations: [
      5, 12, 0,  1,   7, 12, 0,  2,
      5, 24, 0,  3,   7, 24, 0,  4,
      5, 36, 0,  5,   7, 36, 0,  6,
      5, 48, 0,  7,   7, 48, 0,  8,
      5, 60, 0,  9,   7, 60, 0, 10
    ]

    visualization:
      node_scale: 0.12
      node_color: [0.0, 1.0, 0.0, 0.7]
      edge_width: 0.04
      edge_color: [0.0, 0.0, 1.0, 0.6]
      obstacle_scale: 0.95
      obstacle_color: [1.0, 0.0, 0.0, 0.9]
      agent_scale: 0.35
      agent_color: [1.0, 0.0, 1.0, 1.0]
      induct_station_scale: 0.9
      induct_station_color: [0.0, 0.5, 1.0, 1.0]
      eject_station_scale: 0.8
      eject_station_color: [1.0, 0.5, 0.0, 1.0]
      charging_station_scale: 0.8
      charging_station_color: [0.0, 1.0, 0.5, 1.0]

    frame_id: "map"

    topics:
      nodes: "gridworld/nodes"
      edges: "gridworld/edges"
      obstacles: "gridworld/obstacles"
      agents: "gridworld/agents"
      induct_stations: "gridworld/induct_stations"
      eject_stations: "gridworld/eject_stations"
      charging_stations: "gridworld/charging_stations"
