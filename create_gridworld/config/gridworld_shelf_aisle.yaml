# Shelf-Aisle Warehouse Configuration
# Based on:
#   Li, J., Tinka, A., Kiesel, S., Durham, J.W., Kumar, T.K.S., & Koenig, S. (2021).
#   "Lifelong Multi-Agent Path Finding in Large-Scale Warehouses."
#   Proceedings of AAAI 2021. https://doi.org/10.1609/aaai.v35i13.17344
#
#   Sturtevant, N.R. (2012). "Benchmarks for Grid-Based Pathfinding."
#   IEEE Transactions on Computational Intelligence and AI in Games, 4(2), 144-148.
#   https://doi.org/10.1109/TCIAIG.2012.2197499
#
# Layout: Exact reproduction of movingai.com benchmark map "warehouse-10-20-10-2-1".
#   161x63 grid, 1-cell perimeter border, 5,699 passable states.
#   10 shelf columns (each 10 cells wide) arranged across the map center.
#   Each column contains 20 horizontal shelf blocks (2 cells tall) separated by
#   1-cell horizontal aisles. 2-cell vertical aisles between shelf columns.
#   Large left (x=1..20) and right (x=139..159) open highways for agent circulation.
#   Induct stations on left wall, eject stations on right wall.
#   470 agents match Li et al. 2021 lower-range experiments on this exact map.
#
# Grid: 161x63 | Agents: 200 | Induct: 20 | Eject: 19 | Charging: 14
#
# Horizontal layout (x, 0-indexed):
#   x=0         : left border (1-cell)
#   x=1..20     : left open highway  (20 cells)
#   x=21..30    : shelf column 1     x=31,32: v-aisle 1
#   x=33..42    : shelf column 2     x=43,44: v-aisle 2
#   x=45..54    : shelf column 3     x=55,56: v-aisle 3
#   x=57..66    : shelf column 4     x=67,68: v-aisle 4
#   x=69..78    : shelf column 5     x=79,80: v-aisle 5
#   x=81..90    : shelf column 6     x=91,92: v-aisle 6
#   x=93..102   : shelf column 7     x=103,104: v-aisle 7
#   x=105..114  : shelf column 8     x=115,116: v-aisle 8
#   x=117..126  : shelf column 9     x=127,128: v-aisle 9
#   x=129..138  : shelf column 10
#   x=139..159  : right open highway (21 cells)
#   x=160       : right border (1-cell)
#
# Vertical layout (y, 0-indexed):
#   y=0: bottom border | y=1: bottom margin (passable)
#   Shelf rows at y=2,3 | 5,6 | 8,9 | 11,12 | 14,15 | 17,18 | 20,21 | 23,24 |
#                         26,27 | 29,30 | 32,33 | 35,36 | 38,39 | 41,42 | 44,45 |
#                         47,48 | 50,51 | 53,54 | 56,57 | 59,60
#   Horizontal aisles at y=4,7,10,13,16,19,22,25,28,31,34,37,40,43,46,49,52,55,58
#   y=61: top margin (passable) | y=62: top border

